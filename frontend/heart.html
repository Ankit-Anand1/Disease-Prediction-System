<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction - MedPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="app-body">
    <nav class="navbar glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                <span>MedPredict</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="diabetes.html">Diabetes</a>
                <a href="heart.html" class="active">Heart Disease</a>
            </div>
            <button class="mobile-menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('active')"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <main class="dashboard">
        <div class="dashboard-header">
            <div class="title-wrapper">
                <div class="title-icon heart-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                <div>
                    <h1>Heart Disease Assessment</h1>
                    <p>Enter cardiovascular metrics for an instant AI-powered risk analysis.</p>
                </div>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="form-card">
                <form id="predictForm" data-type="heart">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Age (Years)</label>
                            <input type="number" name="age" required min="1" step="1" placeholder="e.g. 55">
                        </div>
                        <div class="input-group">
                            <label>Sex</label>
                            <select name="sex" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Chest Pain Type</label>
                            <select name="cp" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="0">Typical Angina</option>
                                <option value="1">Atypical Angina</option>
                                <option value="2">Non-anginal Pain</option>
                                <option value="3">Asymptomatic</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Resting Blood Pressure (mmHg)</label>
                            <input type="number" name="trestbps" required min="80" step="1" placeholder="e.g. 130">
                        </div>
                        <div class="input-group">
                            <label>Cholesterol (mg/dL)</label>
                            <input type="number" name="chol" required min="100" step="1" placeholder="e.g. 240">
                        </div>
                        <div class="input-group">
                            <label>Fasting Blood Sugar > 120 mg/dl</label>
                            <select name="fbs" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Resting ECG Results</label>
                            <select name="restecg" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="0">Normal</option>
                                <option value="1">ST-T Wave Abnormality</option>
                                <option value="2">Left Ventricular Hypertrophy</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Max Heart Rate Achieved</label>
                            <input type="number" name="thalach" required min="60" step="1" placeholder="e.g. 150">
                        </div>
                        <div class="input-group">
                            <label>Exercise Induced Angina</label>
                            <select name="exang" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>ST Depression (Oldpeak)</label>
                            <input type="number" name="oldpeak" required min="0" step="0.1" placeholder="e.g. 1.5">
                        </div>
                        <div class="input-group">
                            <label>Slope of Peak Exercise ST Segment</label>
                            <select name="slope" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="0">Upsloping</option>
                                <option value="1">Flat</option>
                                <option value="2">Downsloping</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Number of Major Vessels (0-4)</label>
                            <input type="number" name="ca" required min="0" max="4" step="1" placeholder="e.g. 0">
                        </div>
                        <div class="input-group" style="grid-column: span 1;">
                            <label>Thalassemia</label>
                            <select name="thal" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="0">Normal</option>
                                <option value="1">Fixed Defect</option>
                                <option value="2">Reversable Defect</option>
                                <option value="3">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-secondary btn-large btn-block" id="submitBtn">
                            <i class="fa-solid fa-microchip"></i> Get Risk Prediction
                        </button>
                    </div>
                </form>
            </div>

            <!-- Results Panel (Hidden by default) -->
            <div id="resultsPanel" class="results-card hidden">
                <!-- Injected via JS -->
            </div>
        </div>
    </main>
    <script src="./js/main.js"></script>
</body>
</html>
